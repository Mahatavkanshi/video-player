<!DOCTYPE html>
<html>
<head>
  <title>My Video Player</title>
</head>
<body>

  <!-- Video -->
  <video id="video" width="500">
    <source src="video.mp4" type="video/mp4">
  </video>

  <br><br>

  <!-- Button -->
  <button id="playBtn">Play</button>
  <br><input type="range" id="progress" value="0" min="0" max="100"><br>

  <script src="script.js"></script>

</body>
</html>
