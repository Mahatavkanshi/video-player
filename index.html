<!DOCTYPE html>
<html>
<head>
  <title>My Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player">
    <video id="video">
      <source src="video.mp4" type="video/mp4">
    </video>
    <div id="dropHint" class="dropHint">Drop video file to play</div>

    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="backBtn" title="Back 5 seconds">&lt;&lt; 5s</button>
      <button id="forwardBtn" title="Forward 5 seconds">5s &gt;&gt;</button>
      <input type="range" id="progress" min="0" max="100" value="0">
      <span id="timeDisplay" class="timeDisplay">00:00 / 00:00</span>

      <div class="volumeWrap">
        <button id="muteIcon" class="iconBtn" aria-label="Mute or unmute" title="Mute or unmute">&#128266;</button>
        <span id="muteState" class="muteState">Unmuted</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
      </div>

      <label for="speed" class="inlineLabel">Speed</label>
      <select id="speed" aria-label="Playback speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>

      <button id="pipBtn">PiP</button>
      <button id="fullscreenBtn">Fullscreen</button>
      <label for="fileInput" id="fileBtn">Open File</label>
      <input type="file" id="fileInput" accept="video/*">
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
